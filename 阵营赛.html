<title>🦗 边狱巴士 · 阵营赛</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: #0a0f1a;
  color: #e2e8f0;
  min-height: 100vh;
}
.header {
  background: linear-gradient(135deg, #1e1b4b, #0f172a);
  border-bottom: 1px solid #1e293b;
  padding: 16px 20px;
  text-align: center;
}
.header h1 {
  font-size: 22px;
  font-weight: 800;
  background: linear-gradient(135deg, #818cf8, #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header .sub { font-size: 13px; color: #64748b; margin-top: 4px; }
.container { max-width: 1400px; margin: 0 auto; padding: 12px 16px; }
.section {
  background: #141b2d;
  border: 1px solid #1e293b;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
}
.section-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; color: #e2e8f0; }

.btn {
  padding: 9px 20px;
  border: none;
  border-radius: 10px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { filter: brightness(1.15); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }
.btn-primary { background: linear-gradient(135deg, #818cf8, #6366f1); color: #fff; }
.btn-success { background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; }
.btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; }
.btn-warning { background: linear-gradient(135deg, #eab308, #ca8a04); color: #000; }
.btn-secondary { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; }

.draw-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 20px 0;
}
.draw-result {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  width: 100%;
  max-width: 1200px;
}
@media (max-width: 800px) { .draw-result { grid-template-columns: 1fr; } }

.player-draw {
  background: #0f172a;
  border: 1px solid #1e293b;
  border-radius: 12px;
  padding: 14px;
}
.player-draw .pd-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.player-draw .pd-name { font-size: 16px; font-weight: 700; }
.player-draw .pd-factions { display: flex; flex-direction: column; gap: 6px; }
.faction-card-sm {
  background: #141b2d;
  border: 1px solid #1e293b;
  border-radius: 8px;
  padding: 8px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: all 0.15s;
}
.faction-card-sm:hover { border-color: #818cf8; }
.faction-card-sm.selected { border-color: #22c55e; background: rgba(34,197,94,0.1); }
.faction-card-sm.used { opacity: 0.4; }
.faction-card-sm .fc-name { font-size: 14px; font-weight: 600; }
.faction-card-sm .fc-count { font-size: 12px; color: #64748b; }
.tag-finger { color: #f472b6; }

.game-phase { display: none; }
.game-phase.active { display: block; }

.game-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.game-tab {
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid #1e293b;
  background: #0f172a;
  color: #64748b;
}
.game-tab.active { background: #1e3a5f; border-color: #818cf8; color: #e2e8f0; }
.game-tab.played { background: #141b2d; color: #22c55e; border-color: #22c55e; }

.step-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.step {
  padding: 5px 12px;
  border-radius: 6px;
  font-size: 12px;
  background: #0f172a;
  color: #64748b;
  border: 1px solid #1e293b;
}
.step.done { background: #1a3a2a; color: #22c55e; border-color: #22c55e; }
.step.current { background: #1e3a5f; color: #818cf8; border-color: #818cf8; }

.battle-setup {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 12px;
  align-items: start;
}
@media (max-width: 900px) { .battle-setup { grid-template-columns: 1fr 1fr; } }

.player-panel {
  background: #0f172a;
  border: 1px solid #1e293b;
  border-radius: 10px;
  padding: 12px;
}
.player-panel .pp-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid #1e293b;
}
.player-panel .pp-name { font-size: 14px; font-weight: 700; }
.player-panel .pp-faction { font-size: 13px; color: #818cf8; }
.pp-body { min-height: 80px; }

.char-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.char-card {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 8px;
  border-radius: 6px;
  background: rgba(255,255,255,0.03);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 13px;
}
.char-card:hover { border-color: #334155; background: rgba(255,255,255,0.06); }
.char-card.banned {
  border-color: #ef4444;
  background: rgba(239,68,68,0.1);
  cursor: default;
  opacity: 0.4;
  text-decoration: line-through;
}
.char-card.picked {
  border-color: #22c55e;
  background: rgba(34,197,94,0.1);
  cursor: default;
  opacity: 0.6;
}
.char-card .cc-name { flex: 1; }
.char-card .cc-tag {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 4px;
  flex-shrink: 0;
}
.tag-finger-tag { background: #f472b6; color: #000; }
.tag-san { background: #64748b; color: #fff; }

.pick-area {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
  padding: 8px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  min-height: 50px;
}
.pick-slot {
  width: 100%;
  height: 36px;
  border-radius: 6px;
  border: 2px dashed #334155;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  color: #64748b;
  padding: 0 10px;
}
.pick-slot.filled {
  border-style: solid;
  border-color: #22c55e;
  background: rgba(34,197,94,0.12);
  color: #e2e8f0;
  cursor: pointer;
}
.pick-slot.filled .remove {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #ef4444;
  color: #fff;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
}
.pick-slot .slot-num {
  color: #64748b;
  font-size: 11px;
  flex-shrink: 0;
  width: 20px;
}

.dice-area {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 16px;
  min-width: 120px;
  flex-direction: column;
}
.dice-box {
  width: 60px;
  height: 60px;
  border-radius: 12px;
  background: #1e293b;
  border: 2px solid #334155;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  font-weight: 800;
}
.dice-box.winner { border-color: #22c55e; background: rgba(34,197,94,0.15); }
.vs-divider { font-size: 20px; font-weight: 800; color: #64748b; display: flex; align-items: center; justify-content: center; }

.status-bar {
  text-align: center;
  padding: 8px;
  font-size: 14px;
  color: #94a3b8;
  margin-top: 8px;
}

.score-board {
  display: flex;
  justify-content: center;
  gap: 24px;
  padding: 8px 0;
}
.score-item {
  text-align: center;
  padding: 6px 16px;
  border-radius: 8px;
  background: #0f172a;
  border: 1px solid #1e293b;
}
.score-item .si-label { font-size: 12px; color: #64748b; }
.score-item .si-value { font-size: 22px; font-weight: 800; }
.score-item .si-name { font-size: 13px; font-weight: 600; }

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #141b2d;
  border: 1px solid #1e293b;
  border-radius: 10px;
  padding: 10px 18px;
  font-size: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 200;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.finger-toggle {
  margin-top: 8px;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid #f472b6;
  background: rgba(244,114,182,0.1);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.finger-toggle:hover { background: rgba(244,114,182,0.2); }
.finger-toggle.active { border-color: #22c55e; background: rgba(34,197,94,0.15); }

.faction-label {
  font-size: 12px;
  color: #64748b;
  padding: 3px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  margin: 6px 0 3px;
}
.faction-label:first-of-type { margin-top: 0; }
</style>
</head>

</div>

<div class="container">

<div id="scoreBoard" class="section" style="display:none;">
  <div class="score-board" id="scoreBoardInner">
    <div class="score-item"><div class="si-label" style="color:#818cf8;">🔵 蓝方</div><div class="si-value" id="scoreA">0</div></div>
    <div class="score-item"><div class="si-label">第</div><div class="si-value" id="gameNum">0</div><div class="si-label">/3 场</div></div>
    <div class="score-item"><div class="si-label" style="color:#f472b6;">🔴 红方</div><div class="si-value" id="scoreB">0</div></div>
  </div>
</div>

<!-- DRAW -->
<div id="drawSection" class="section">
  <div class="section-title">🎲 第1步 · 抽阵营</div>
  <div class="draw-area">
    <button class="btn btn-primary" onclick="startDraw()" id="drawBtn">🎲 开始抽阵营</button>
    <div id="drawResult" class="draw-result"></div>
  </div>
</div>

<!-- GAME -->
<div id="gameSection" class="section game-phase">
  <div class="section-title">⚔️ 第2步 · BO3对战</div>
  
  <div class="game-tabs" id="gameTabs">
    <div class="game-tab" data-game="0" onclick="switchGame(0)">第1场</div>
    <div class="game-tab" data-game="1" onclick="switchGame(1)">第2场</div>
    <div class="game-tab" data-game="2" onclick="switchGame(2)">第3场</div>
  </div>

  <div class="step-bar" id="stepBar"></div>

  <div class="battle-setup">
    <div class="player-panel" id="panelA">
      <div class="pp-header" style="border-color:#1e3a5f;">
        <span class="pp-name" style="color:#818cf8;">🔵 蓝方</span>
        <span class="pp-faction" id="factionNameA"></span>
      </div>
      <div class="pp-body" id="bodyA"></div>
      <div class="finger-toggle" id="fingerToggleA" onclick="toggleFinger('A')">☝️ 启用手指支援</div>
    </div>

    <div class="dice-area" id="diceArea">
      <button class="btn btn-warning" onclick="rollDice()" id="diceBtn" style="display:none;">🎲 掷骰子</button>
      <div id="diceResult" style="display:none;">
        <div style="display:flex;gap:12px;align-items:center;">
          <div><div style="font-size:11px;color:#818cf8;">蓝方</div><div class="dice-box" id="diceA">-</div></div>
          <div class="vs-divider">VS</div>
          <div><div style="font-size:11px;color:#f472b6;">红方</div><div class="dice-box" id="diceB">-</div></div>
        </div>
        <div style="margin-top:8px;font-size:13px;font-weight:600;" id="diceWinner"></div>
      </div>
    </div>

    <div class="player-panel" id="panelB">
      <div class="pp-header" style="border-color:#3b1f3b;">
        <span class="pp-name" style="color:#f472b6;">🔴 红方</span>
        <span class="pp-faction" id="factionNameB"></span>
      </div>
      <div class="pp-body" id="bodyB"></div>
      <div class="finger-toggle" id="fingerToggleB" onclick="toggleFinger('B')">☝️ 启用手指支援</div>
    </div>
  </div>

  <div class="status-bar" id="statusBar">⬅️ 先完成抽阵营</div>
</div>

</div>

<div class="toast" id="toast"></div>

const SANREN = [10104,10109,10210,10211,10213,10214,10306,10404,10515,10603,10605,10609,10615,
  10708,10716,10807,10812,10813,10814,10905,11009,11012,11013,11105,11114,11203,
  11207,11211,11213,11215];

const NORMAL = [
  {name:'协会联盟', ids:[10112,10806,10908,10206,11104,10910,11011,10510,10608,10907]},
  {name:'事务所联盟', ids:[10611,10711,10707,10808,10810,11206]},
  {name:'脑叶公司E.G.O', ids:[10110,10207,10312,10410,10414,10514,10705,10913,11107,11214]},
  {name:'黑兽+鸿园', ids:[10114,10212,10313,10411,10714,10912,11014,11112,11212,10413,10613]},
  {name:'W公司', ids:[10106,10302,10405,10503,10713,11110]},
  {name:'拉·曼却领', ids:[10310,10513,10911,11111,11210]},
  {name:'R公司', ids:[10506,10612,10703,10802,10914]},
  {name:'剑契组', ids:[10103,10208,10508,11002,10815]},
  {name:'五协会', ids:[10305,10311,10511,11008]},
  {name:'黑云会', ids:[10403,10712,10811,10902]},
  {name:'N公司', ids:[10113,10412,10504,10204,11005]},
  {name:'T公司', ids:[10309,11113]},
  {name:'山庄', ids:[10408,11209,11108,10710]},
];

const FINGERS = [
  {name:'拇指', ids:[10512,10916]},
  {name:'食指', ids:[10115,10314]},
  {name:'中指', ids:[10715,11115]},
  {name:'环指', ids:[10215,10614,10915]},
  {name:'小指', ids:[10415,11015]},
];

let G = {
  A: { normal:[], finger:null, remaining:[], picked:[], banned:null, fingerActive:false, fingerPick:null, sanrenAdd:[] },
  B: { normal:[], finger:null, remaining:[], picked:[], banned:null, fingerActive:false, fingerPick:null, sanrenAdd:[] },
  currentGame: 0, step: 'select', scores: [0,0],
  firstPicker: null, handControl: null,
  usedFingers: { A: false, B: false }, lastWinner: null, lastLoser: null,
};

function rng(s){ return function(){ s=(s*1664525+1013904223)&0xFFFFFFFF; return (s>>>0)/4294967296; }; }
function shuffle(a,r){ var s=a.slice(),i=s.length,j,t; while(i){j=Math.floor(r()*i--);t=s[i];s[i]=s[j];s[j]=t;} return s; }
function sample(a,n,r){ return shuffle(a,r).slice(0,n); }
function pickRandom(a){ return a[Math.floor(Math.random()*a.length)]; }

var tt=null;
function toast(m){ var e=document.getElementById('toast'); e.textContent=m; e.className='toast show'; clearTimeout(tt); tt=setTimeout(function(){e.className='toast';},2500); }

function startDraw() {
  var s=Math.floor(Math.random()*99999999), r=rng(s), r2=rng(s+7777);
  G.A.normal=sample(NORMAL,3,r);
  G.A.finger=sample(FINGERS,1,r2)[0];
  G.B.normal=sample(NORMAL,3,r);
  G.B.finger=sample(FINGERS.filter(function(f){return f.name!==G.A.finger.name;}),1,r2)[0];
  G.A.remaining=G.A.normal.slice(); G.B.remaining=G.B.normal.slice();
  G.scores=[0,0]; G.usedFingers={A:false,B:false}; G.lastWinner=null; G.lastLoser=null;
  showDrawResult();
  document.getElementById('drawBtn').textContent='🔄 重新抽阵营';
  document.getElementById('gameSection').classList.add('active');
  document.getElementById('scoreBoard').style.display='block';
  G.currentGame=0; initGame(0);
}

function showDrawResult(){
  var h='';
  for(var s of ['A','B']){
    var p=G[s],c=(s==='A'?'#818cf8':'#f472b6'),l=(s==='A'?'🔵 蓝方':'🔴 红方');
    h+='<div class="player-draw"><div class="pd-header"><span class="pd-name" style="color:'+c+';">'+l+'</span></div><div class="pd-factions">';
    h+='<div class="faction-card-sm" style="cursor:default;"><span class="fc-name">主阵营</span><span class="fc-count">3个</span></div>';
    for(var f of p.normal) h+='<div class="faction-card-sm" style="cursor:default;"><span>'+f.name+'</span><span class="fc-count">'+f.ids.length+'人</span></div>';
    h+='<div class="faction-card-sm" style="cursor:default;border-color:#f472b6;"><span class="fc-name" style="color:#f472b6;">☝️ '+p.finger.name+'</span><span class="fc-count">'+p.finger.ids.length+'人</span></div></div></div>';
  }
  document.getElementById('drawResult').innerHTML=h;
}

function initGame(idx){
  G.currentGame=idx; G.step='select';
  G.A.picked=[]; G.B.picked=[]; G.A.banned=null; G.B.banned=null;
  G.A.fingerActive=false; G.B.fingerActive=false; G.A.fingerPick=null; G.B.fingerPick=null;
  G.A.sanrenAdd=[]; G.B.sanrenAdd=[]; G.firstPicker=null;
  // Hand操
  if(idx===0 && G.scores[0]===0 && G.scores[1]===0){
    var da,db; do{ da=Math.floor(Math.random()*6)+1; db=Math.floor(Math.random()*6)+1; }while(da===db);
    G.handControl = da>=db ? 'A' : 'B';
  } else {
    G.handControl = G.lastLoser || (G.handControl==='A'?'B':'A');
  }
  updateTabs(); renderGame();
}

function switchGame(idx){
  if(idx<G.currentGame) return;
  if(idx>G.currentGame){ if(G.step!=='done'){toast('⚠️ 先完成当前场次！');return;} G.currentGame=idx; initGame(idx); }
  updateTabs(); renderGame();
}

function updateTabs(){
  var ts=document.querySelectorAll('.game-tab');
  ts.forEach(function(t,i){t.classList.remove('active','played');if(i===G.currentGame)t.classList.add('active');else if(i<G.currentGame)t.classList.add('played');});
  document.getElementById('scoreA').textContent=G.scores[0];
  document.getElementById('scoreB').textContent=G.scores[1];
  document.getElementById('gameNum').textContent=G.currentGame+1;
}

function updateSteps(){
  var st=['选阵','禁人','骰子','选人','开战'], sk=['select','ban','dice','pick','done'], si=sk.indexOf(G.step), h='';
  for(var i=0;i<st.length;i++){ var c='step'; if(i<si)c+=' done'; else if(i===si)c+=' current'; h+='<div class="step '+c+'">'+(i<si?'✓':'')+st[i]+'</div>'; }
  document.getElementById('stepBar').innerHTML=h;
}

function renderGame(){
  updateSteps();
  var fA=G.A.remaining[0], fB=G.B.remaining[0];
  if(G.step==='select') renderSelectPhase();
  else if(G.step==='ban') renderBanPhase();
  else if(G.step==='dice') renderDicePhase();
  else if(G.step==='pick') renderPickPhase();
  else if(G.step==='done') renderDonePhase();
  document.getElementById('fingerToggleA').style.display=(G.step==='select'&&!G.usedFingers.A)?'flex':'none';
  document.getElementById('fingerToggleB').style.display=(G.step==='select'&&!G.usedFingers.B)?'flex':'none';
}

function renderSelectPhase(){
  var pA=G.A, pB=G.B, hc=G.handControl==='A'?'🔵 蓝方':'🔴 红方';
  document.getElementById('statusBar').innerHTML='🎮 手操权：'+hc+'　　<button class="btn btn-success" onclick="confirmSelect()">✅ 确定选阵</button>';
  var ha='<div style="font-size:13px;color:#64748b;margin-bottom:8px;">选择本场出阵的主阵营：</div>';
  for(var i=0;i<pA.remaining.length;i++){ var f=pA.remaining[i]; ha+='<div class="faction-card-sm'+(i===0?' selected':'')+'" onclick="selectFaction(\'A\','+i+')"><span class="fc-name">'+f.name+'</span><span class="fc-count">'+f.ids.length+'人</span></div>'; }
  document.getElementById('factionNameA').textContent=pA.remaining.length?pA.remaining[0].name:'';
  document.getElementById('bodyA').innerHTML=ha;
  var hb='<div style="font-size:13px;color:#64748b;margin-bottom:8px;">选择本场出阵的主阵营：</div>';
  for(var i=0;i<pB.remaining.length;i++){ var f=pB.remaining[i]; hb+='<div class="faction-card-sm'+(i===0?' selected':'')+'" onclick="selectFaction(\'B\','+i+')"><span class="fc-name">'+f.name+'</span><span class="fc-count">'+f.ids.length+'人</span></div>'; }
  document.getElementById('factionNameB').textContent=pB.remaining.length?pB.remaining[0].name:'';
  document.getElementById('bodyB').innerHTML=hb;
  document.getElementById('diceBtn').style.display='none'; document.getElementById('diceResult').style.display='none';
}

function selectFaction(side,idx){
  var p=G[side]; if(p.remaining.length<=1){toast('⚠️ 最后阵营不可更换！');return;}
  var t=p.remaining[0]; p.remaining[0]=p.remaining[idx]; p.remaining[idx]=t; renderGame();
}

function confirmSelect(){ if(G.step!=='select')return; G.step='ban'; renderGame(); }

function renderBanPhase(){
  var pA=G.A, pB=G.B, fA=pA.remaining[0], fB=pB.remaining[0];
  document.getElementById('factionNameA').textContent=fA.name;
  document.getElementById('factionNameB').textContent=fB.name;
  var ha='<div style="font-size:13px;color:#ca8a04;margin-bottom:6px;">👆 点击红方阵营1人禁掉：</div><div class="char-list">';
  for(var id of fB.ids) ha+='<div class="char-card'+(G.B.banned===id?' banned':'')+'" onclick="banChar(\'A\','+id+')"><span class="cc-name">'+P[id]+'</span></div>';
  ha+='</div>'; document.getElementById('bodyA').innerHTML=ha;
  var hb='<div style="font-size:13px;color:#ca8a04;margin-bottom:6px;">👆 点击蓝方阵营1人禁掉：</div><div class="char-list">';
  for(var id of fA.ids) hb+='<div class="char-card'+(G.A.banned===id?' banned':'')+'" onclick="banChar(\'B\','+id+')"><span class="cc-name">'+P[id]+'</span></div>';
  hb+='</div>'; document.getElementById('bodyB').innerHTML=hb;
  document.getElementById('diceBtn').style.display='none'; document.getElementById('diceResult').style.display='none';
  document.getElementById('statusBar').innerHTML='🔵 '+(G.B.banned?'✅已禁':'点击禁红方')+' ｜ 🔴 '+(G.A.banned?'✅已禁':'点击禁蓝方')+'<br><button class="btn btn-success" onclick="confirmBan()"'+(G.A.banned&&G.B.banned?'':' disabled')+'>✅ 确定禁人</button>';
}
function banChar(s,i){if(s==='A')G.B.banned=i;else G.A.banned=i;renderGame();}
function confirmBan(){if(!G.A.banned||!G.B.banned){toast('⚠️双方都要禁1人！');return;}G.step='dice';renderGame();}

function renderDicePhase(){
  var fA=G.A.remaining[0],fB=G.B.remaining[0];
  document.getElementById('factionNameA').textContent=fA.name;
  document.getElementById('factionNameB').textContent=fB.name;
  var ha='<div style="font-size:12px;color:#64748b;">人物池：';
  for(var id of fA.ids) ha+=(id===G.A.banned?'<span style="color:#ef4444;text-decoration:line-through;">'+getShortName(id)+'</span> ':(getShortName(id)+' '));
  ha+='</div><div style="font-size:11px;color:#64748b;margin-top:4px;">可用：'+(fA.ids.length-1)+'人</div>';
  document.getElementById('bodyA').innerHTML=ha;
  var hb='<div style="font-size:12px;color:#64748b;">人物池：';
  for(var id of fB.ids) hb+=(id===G.B.banned?'<span style="color:#ef4444;text-decoration:line-through;">'+getShortName(id)+'</span> ':(getShortName(id)+' '));
  hb+='</div><div style="font-size:11px;color:#64748b;margin-top:4px;">可用：'+(fB.ids.length-1)+'人</div>';
  document.getElementById('bodyB').innerHTML=hb;
  document.getElementById('diceBtn').style.display='block'; document.getElementById('diceResult').style.display='none';
  document.getElementById('statusBar').innerHTML='🎲 点击掷骰子（点数大者后选，平局重投）';
}

function rollDice(){
  var dA,dB; do{ dA=Math.floor(Math.random()*6)+1; dB=Math.floor(Math.random()*6)+1; }while(dA===dB);
  document.getElementById('diceA').textContent=dA; document.getElementById('diceB').textContent=dB;
  document.getElementById('diceA').className='dice-box'+(dA>dB?' winner':'');
  document.getElementById('diceB').className='dice-box'+(dB>dA?' winner':'');
  document.getElementById('diceResult').style.display='block';
  G.firstPicker = dA <= dB ? 'A' : 'B';
  var fn=G.firstPicker==='A'?'🔵 蓝方':'🔴 红方', sn=G.firstPicker==='A'?'🔴 红方':'🔵 蓝方';
  document.getElementById('diceWinner').innerHTML='🎲 '+fn+' 先选 · '+sn+' 后选';
  document.getElementById('diceBtn').style.display='none';
  document.getElementById('statusBar').innerHTML='<button class="btn btn-success" onclick="confirmDice()">✅ 确认，开始选人</button>';
}
function confirmDice(){if(!G.firstPicker)return;G.step='pick';renderGame();}

function buildPool(side){
  var p=G[side], f=p.remaining[0]; if(!f)return[];
  var ban=side==='A'?G.A.banned:G.B.banned;
  var avail=f.ids.filter(function(id){return id!==ban;});
  var minNeed=p.fingerActive?4:5;
  if(p.sanrenAdd.length===0 && avail.length<minNeed){
    var need=minNeed-avail.length, used={};
    for(var id of avail) used[getSinner(id)]=true;
    var pool=SANREN.slice();
    var rr=rng(Date.now()+7777*(side==='A'?0:1));
    pool=shuffle(pool,rr);
    for(var i=0;i<pool.length && p.sanrenAdd.length<need;i++){
      var sin=getSinner(pool[i]);
      if(!used[sin]){ p.sanrenAdd.push(pool[i]); used[sin]=true; }
    }
  }
  return avail.concat(p.sanrenAdd);
}

function renderPickPhase(){
  var pA=G.A,pB=G.B,fA=pA.remaining[0],fB=pB.remaining[0];
  document.getElementById('factionNameA').textContent=fA.name;
  document.getElementById('factionNameB').textContent=fB.name;
  var first=G.firstPicker;
  var aa=buildPool('A'), ab=buildPool('B');
  var picking = first==='A'?(pA.picked.length<5?'A':(pB.picked.length<5?'B':null)):(pB.picked.length<5?'B':(pA.picked.length<5?'A':null));
  document.getElementById('bodyA').innerHTML = pickSide('A',aa,picking,first);
  document.getElementById('bodyB').innerHTML = pickSide('B',ab,picking,first);
  document.getElementById('diceBtn').style.display='none';
  document.getElementById('diceResult').style.display='block';
  if(picking){
    var pn=picking==='A'?'🔵 蓝方':'🔴 红方', ct=picking==='A'?pA.picked.length:pB.picked.length;
    document.getElementById('statusBar').innerHTML='✋ '+pn+' 选人中（'+(5-ct)+'/5）';
  } else if(pA.picked.length>=5&&pB.picked.length>=5){
    document.getElementById('statusBar').innerHTML='<button class="btn btn-success" onclick="confirmPicks()">✅ 确认阵容，开战！</button>';
  }
}

function pickSide(side,avail,picking,first){
  var p=G[side], picked=p.picked, canPick=(picking===side&&picked.length<5);
  var label=side==='A'?'🔵 蓝方':'🔴 红方', hc=G.handControl===side?'🎮':'';
  var h='<div style="font-size:12px;color:#64748b;margin-bottom:4px;">'+label+' '+hc+'</div><div class="pick-area">';
  for(var i=0;i<5;i++){
    if(i<picked.length){
      var pid=picked[i], isFinger=(p.fingerActive&&p.fingerPick===pid);
      h+='<div class="pick-slot filled" onclick="removePick(\''+side+'\','+i+')" title="点击移除"><span class="slot-num">#'+(i+1)+'</span><span>'+(isFinger?'☝️ ':'')+(P[pid]||'')+'</span><span class="remove">×</span></div>';
    } else {
      h+='<div class="pick-slot"><span class="slot-num">#'+(i+1)+'</span></div>';
    }
  }
  h+='</div>';
  // Available chars - group by normal vs sanren
  h+='<div style="font-size:12px;color:#64748b;margin:8px 0 4px;">'+(canPick?'👆 点击添加：':'人物池：')+'</div><div class="char-list">';
  var normalChars=[], sanChars=[], pickedSinners={};
  for(var pid of picked) pickedSinners[getSinner(pid)]=true;
  for(var id of avail){
    if(picked.indexOf(id)!==-1) continue;
    var sin=getSinner(id), blocked=!!pickedSinners[sin];
    if(SANREN.indexOf(id)!==-1) sanChars.push({id:id,blocked:blocked});
    else normalChars.push({id:id,blocked:blocked,sin:sin});
  }
  if(normalChars.length){
    for(var c of normalChars){
      h+='<div class="char-card'+(canPick&&!c.blocked?'" onclick="addPick(\''+side+'\','+c.id+')"':c.blocked?'" style="opacity:0.4;cursor:default;" title="同角色不可重复"':'"')+'>';
      h+='<span class="cc-name">'+P[c.id]+'</span>';
      if(c.blocked) h+='<span style="font-size:10px;color:#ef4444;">重复</span>';
      h+='</div>';
    }
  }
  if(sanChars.length){
    h+='<div class="faction-label">📦 散人·补员</div>';
    for(var c of sanChars){
      h+='<div class="char-card'+(canPick&&!c.blocked?'" onclick="addPick(\''+side+'\','+c.id+')"':c.blocked?'" style="opacity:0.4;cursor:default;" title="同角色不可重复"':'"')+'>';
      h+='<span class="cc-name">'+P[c.id]+'</span><span class="cc-tag tag-san">散</span>';
      if(c.blocked) h+='<span style="font-size:10px;color:#ef4444;">重复</span>';
      h+='</div>';
    }
  }
  h+='</div>';
  if(p.fingerActive&&p.fingerPick) h+='<div style="margin-top:6px;padding:4px 8px;background:rgba(244,114,182,0.1);border-radius:6px;font-size:12px;">☝️ 手指支援 · '+P[p.fingerPick]+'（失去手操权）</div>';
  return h;
}

function addPick(side,id){
  var p=G[side]; if(p.picked.length>=5)return;
  // Check duplicate sinner
  var sin=getSinner(id);
  for(var pid of p.picked) if(getSinner(pid)===sin){toast('⚠️ 同角色不可重复！');return;}
  p.picked.push(id);
  // Update hand操 if this side has hand操 (hand操 player picks first, then other side)
  renderGame();
}

function removePick(side,idx){
  var p=G[side];
  if(p.fingerActive&&p.fingerPick&&p.picked[idx]===p.fingerPick){toast('⚠️ 手指人格不可移除');return;}
  p.picked.splice(idx,1); renderGame();
}

function toggleFinger(side){
  var p=G[side]; if(G.usedFingers[side]){toast('⚠️ 手指已用过！');return;}
  p.fingerActive=!p.fingerActive;
  if(p.fingerActive){ p.fingerPick=pickRandom(p.finger.ids); p.picked=[p.fingerPick]; G.usedFingers[side]=true; }
  else { p.fingerPick=null; p.picked=[]; }
  renderGame(); toast((p.fingerActive?'☝️ ':'❌ ')+(side==='A'?'蓝方':'红方')+'手指'+(p.fingerActive?'已启用':'已取消'));
}

function confirmPicks(){G.step='done';renderGame();}

function renderDonePhase(){
  var pA=G.A,pB=G.B,fA=pA.remaining[0],fB=pB.remaining[0];
  document.getElementById('factionNameA').textContent=fA.name;
  document.getElementById('factionNameB').textContent=fB.name;
  var ha='<div style="font-size:13px;font-weight:600;color:#22c55e;margin-bottom:6px;">✅ 最终阵容</div><div class="pick-area">';
  for(var i=0;i<5;i++){
    var pid=pA.picked[i]; if(!pid){ha+='<div class="pick-slot"><span class="slot-num">#'+(i+1)+'</span></div>';continue;}
    ha+='<div class="pick-slot filled" style="cursor:default;"><span class="slot-num">#'+(i+1)+'</span><span>'+(pA.fingerActive&&pA.fingerPick===pid?'☝️ ':'')+(P[pid]||'')+'</span></div>';
  }
  ha+='</div>'; if(pA.fingerActive) ha+='<div style="font-size:11px;color:#f472b6;margin-top:4px;">☝️ 手指失去手操权</div>';
  document.getElementById('bodyA').innerHTML=ha;
  var hb='<div style="font-size:13px;font-weight:600;color:#22c55e;margin-bottom:6px;">✅ 最终阵容</div><div class="pick-area">';
  for(var i=0;i<5;i++){
    var pid=pB.picked[i]; if(!pid){hb+='<div class="pick-slot"><span class="slot-num">#'+(i+1)+'</span></div>';continue;}
    hb+='<div class="pick-slot filled" style="cursor:default;"><span class="slot-num">#'+(i+1)+'</span><span>'+(pB.fingerActive&&pB.fingerPick===pid?'☝️ ':'')+(P[pid]||'')+'</span></div>';
  }
  hb+='</div>'; if(pB.fingerActive) hb+='<div style="font-size:11px;color:#f472b6;margin-top:4px;">☝️ 手指失去手操权</div>';
  document.getElementById('bodyB').innerHTML=hb;
  document.getElementById('statusBar').innerHTML='<div style="display:flex;gap:10px;justify-content:center;">'+
    '<button class="btn btn-success" onclick="recordWin(\'A\')">🏆 蓝方胜</button>'+
    '<button class="btn btn-danger" onclick="recordWin(\'B\')">🏆 红方胜</button></div>';
}

function recordWin(side){
  var idx=side==='A'?0:1; G.scores[idx]++;
  G.lastWinner=side; G.lastLoser=side==='A'?'B':'A';
  G.A.remaining.shift(); G.B.remaining.shift();
  updateTabs();
  if(G.scores[0]>=2||G.scores[1]>=2){
    var w=G.scores[0]>=2?'🔵 蓝方':'🔴 红方';
    toast('🏆 '+w+' 赢得系列赛！');
    document.getElementById('statusBar').innerHTML='🏆 系列赛结束！'+w+' 获胜（'+G.scores[0]+':'+G.scores[1]+'）<br><button class="btn btn-primary" onclick="location.reload()">🔄 新系列赛</button>';
    return;
  }
  if(G.currentGame<2){ G.currentGame++; initGame(G.currentGame); }
}
